<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="app-wrapper">

    <!-- 1. BALANCE BOX -->
    <div class="box box--large">
      <p class="balance-label">Total Balance</p>
      <p class="balance-amount balance--ok" id="balance-display">Rp 0</p>
      <p class="balance-limit-note" id="balance-limit-note"></p>
    </div>

    <!-- 2. CONTROLS STRIP: Theme toggle + Spending limit -->
    <div class="box box--strip">

      <!-- Left: Theme toggle -->
      <div class="strip-section">
        <span class="strip-label">Appearance</span>
        <div class="theme-toggle-wrap">
          <span class="theme-icon" id="theme-icon">☀️</span>
          <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode">
            <span class="toggle-track">
              <span class="toggle-thumb"></span>
            </span>
          </button>
          <span class="theme-label" id="theme-label">Light Mode</span>
        </div>
      </div>

      <!-- Vertical divider -->
      <div class="strip-divider"></div>

      <!-- Right: Spending limit -->
      <div class="strip-section">
        <span class="strip-label">Spending Limit</span>
        <div class="limit-wrap">
          <div class="limit-input-group">
            <span class="limit-prefix">Rp</span>
            <input
              class="limit-input"
              type="number"
              id="limit-input"
              placeholder="e.g. 150000"
              min="1"
              step="1"
              aria-label="Spending limit in IDR"
            />
          </div>
          <button class="btn-limit btn-limit--set" id="btn-set-limit">Set Limit</button>
          <button class="btn-limit btn-limit--remove" id="btn-remove-limit" style="display:none">Remove</button>
        </div>
        <span class="limit-current" id="limit-current"></span>
      </div>

    </div>

    <!-- 3. MAIN ROW -->
    <div class="box-row">

      <!-- LEFT: Input Form -->
      <div class="box box--small">
        <h2 class="box-title">Add Transaction</h2>
        <form id="transaction-form" novalidate>

          <div class="form-group">
            <label class="form-label" for="item-name">Item Name</label>
            <input
              class="form-input"
              type="text"
              id="item-name"
              name="item-name"
              placeholder="e.g. Lunch, Bus ticket"
              maxlength="100"
              autocomplete="off"
            />
            <span class="form-error" id="error-item-name"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="amount">Amount (Rp)</label>
            <input
              class="form-input"
              type="number"
              id="amount"
              name="amount"
              placeholder="e.g. 25000"
              min="1"
              step="1"
            />
            <span class="form-error" id="error-amount"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="category">Category</label>
            <select class="form-input form-select" id="category" name="category">
              <option value="" disabled selected>Select a category</option>
              <option value="Food">🍔 Food</option>
              <option value="Transport">🚌 Transport</option>
              <option value="Fun">🎉 Fun</option>
            </select>
            <span class="form-error" id="error-category"></span>
          </div>

          <button class="btn-submit" type="submit">Add Transaction</button>

        </form>
      </div>

      <!-- RIGHT: Chart + Transaction List -->
      <div class="box box--small box--right">

        <div class="chart-area">
          <h2 class="box-title">Spending by Category</h2>
          <div class="chart-container">
            <canvas id="spending-chart"></canvas>
            <p class="chart-empty" id="chart-empty-msg">No spending data</p>
          </div>
        </div>

        <div class="section-divider"></div>

        <div class="transaction-section">
          <h2 class="box-title">Transactions</h2>
          <ul class="transaction-list" id="transaction-list">
            <li class="transaction-empty" id="transaction-empty-msg">No transactions yet</li>
          </ul>
        </div>

      </div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
